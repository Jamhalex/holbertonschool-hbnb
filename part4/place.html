<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HBnB - Place Details</title>

    <link
        rel="icon"
        href="images/icon.png"
        type="image/png"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <header>
        <nav aria-label="Main navigation">
            <a
                href="index.html"
                aria-label="HBnB home page"
            >
                <img
                    src="images/logo.png"
                    alt="HBnB Logo"
                    class="logo"
                >
            </a>

            <div class="navigation">
                <a href="index.html">
                    Home
                </a>

                <a
                    href="login.html"
                    id="login-link"
                    class="login-button"
                >
                    Login
                </a>
            </div>
        </nav>
    </header>

    <main>

        <section
            id="place-details"
            class="place-details"
            aria-live="polite"
            aria-busy="true"
        >
            <p>Loading place details...</p>
        </section>

        <section
            id="add-review"
            class="add-review"
            aria-labelledby="review-title"
        >
            <h2 id="review-title">
                Add a Review
            </h2>

            <a
                href="add_review.html"
                id="add-review-link"
                class="details-button"
            >
                Write a Review
            </a>
        </section>

    </main>

    <footer>
        <p>
            &copy; 2026 HBnB. All rights reserved.
        </p>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
