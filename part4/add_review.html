<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HBnB - Add Review</title>

    <link
        rel="icon"
        href="images/icon.png"
        type="image/png"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <header>
        <nav aria-label="Main navigation">
            <a
                href="index.html"
                aria-label="HBnB home page"
            >
                <img
                    src="images/logo.png"
                    alt="HBnB Logo"
                    class="logo"
                >
            </a>

            <div class="navigation">
                <a href="index.html">
                    Home
                </a>
            </div>
        </nav>
    </header>

    <main>
        <section
            class="review-form-container"
            aria-labelledby="review-title"
        >
            <h1 id="review-title">
                Add a Review
            </h1>

            <h2 id="review-place-name">
                Loading place information...
            </h2>

            <form
                id="review-form"
                novalidate
            >
                <label for="review-text">
                    Review
                </label>

                <textarea
                    id="review-text"
                    name="review"
                    rows="6"
                    required
                    placeholder="Write your review here..."
                ></textarea>

                <button type="submit">
                    Submit Review
                </button>

                <p
                    id="review-message"
                    role="alert"
                    aria-live="polite"
                ></p>
            </form>
        </section>
    </main>

    <footer>
        <p>
            &copy; 2026 HBnB. All rights reserved.
        </p>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
