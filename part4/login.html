<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HBnB - Login</title>

    <link
        rel="icon"
        href="images/icon.png"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <header>
        <nav>
            <a href="index.html">
                <img
                    src="images/logo.png"
                    alt="HBnB Logo"
                    class="logo"
                >
            </a>

            <div class="navigation">
                <a href="index.html">
                    Home
                </a>

                <a
                    href="login.html"
                    class="login-button"
                >
                    Login
                </a>
            </div>
        </nav>
    </header>

    <main class="login-main">

        <form id="login-form" class="form">

            <h1>Login</h1>

            <div
                id="login-error"
                class="error-message"
                role="alert"
                aria-live="polite"
            ></div>

            <label for="email">
                Email:
            </label>

            <input
                type="email"
                id="email"
                name="email"
                autocomplete="email"
                required
            >

            <label for="password">
                Password:
            </label>

            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </main>

    <footer>
        <p>
            &copy; 2026 HBnB. All rights reserved.
        </p>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
