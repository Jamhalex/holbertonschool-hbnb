<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HBnB - Places</title>

    <link
        rel="icon"
        href="images/icon.png"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <header>
        <nav>
            <a href="index.html">
                <img
                    src="images/logo.png"
                    alt="HBnB Logo"
                    class="logo"
                >
            </a>

            <div class="navigation">
                <a href="index.html">
                    Home
                </a>

                <a
                    href="login.html"
                    id="login-link"
                    class="login-button"
                >
                    Login
                </a>
            </div>
        </nav>
    </header>

    <main>

        <section class="places-section">

            <div class="places-heading">

                <h1>Available Places</h1>

                <div class="filter-container">
                    <label for="price-filter">
                        Maximum price:
                    </label>

                    <select id="price-filter">
                        <option value="10">$10</option>
                        <option value="50">$50</option>
                        <option value="100">$100</option>
                        <option value="all" selected>
                            All
                        </option>
                    </select>
                </div>

            </div>

            <div
                id="places-list"
                class="places-container"
                aria-live="polite"
            >
                <p>Loading places...</p>
            </div>

        </section>

    </main>

    <footer>
        <p>
            &copy; 2026 HBnB. All rights reserved.
        </p>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
