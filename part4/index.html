<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HBnB - Places</title>

    <link
        rel="icon"
        href="images/icon.png"
        type="image/png"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <header>
        <nav aria-label="Main navigation">
            <a
                href="index.html"
                aria-label="HBnB home page"
            >
                <img
                    src="images/logo.png"
                    alt="HBnB Logo"
                    class="logo"
                >
            </a>

            <div class="navigation">
                <a
                    href="index.html"
                    aria-current="page"
                >
                    Home
                </a>

                <a
                    href="login.html"
                    id="login-link"
                    class="login-button"
                >
                    Login
                </a>
            </div>
        </nav>
    </header>

    <main>
        <section
            class="places-section"
            aria-labelledby="places-title"
        >
            <div class="places-heading">
                <h1 id="places-title">
                    Available Places
                </h1>

                <div
                    class="filters-container"
                    aria-label="Place filters"
                >
                    <div class="filter-container">
                        <label for="country-filter">
                            Country:
                        </label>

                        <select
                            id="country-filter"
                            name="country-filter"
                        >
                            <option value="all">
                                All countries
                            </option>
                        </select>
                    </div>

                    <div class="filter-container">
                        <label for="price-filter">
                            Maximum price:
                        </label>

                        <select
                            id="price-filter"
                            name="price-filter"
                        >
                            <option value="10">
                                $10
                            </option>

                            <option value="50">
                                $50
                            </option>

                            <option value="100">
                                $100
                            </option>

                            <option
                                value="all"
                                selected
                            >
                                All prices
                            </option>
                        </select>
                    </div>
                </div>
            </div>

            <div
                id="places-list"
                class="places-container"
                aria-live="polite"
                aria-busy="true"
            >
                <p>
                    Loading places...
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>
            &copy; 2026 HBnB. All rights reserved.
        </p>
    </footer>

    <script src="scripts.js"></script>

</body>
</html>
